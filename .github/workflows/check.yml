name: Check Toulouse Housing

on:
  schedule:
   - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: toulouse-housing-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run checker
        env:
          CHECKIN_DATE: ${{ vars.CHECKIN_DATE }}
          CHECKOUT_DATE: ${{ vars.CHECKOUT_DATE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_TEST_ALERT: ${{ vars.FORCE_TEST_ALERT }}
        run: node check.js
